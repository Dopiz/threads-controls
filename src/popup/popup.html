<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Auto Reveal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #0f0f0f;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .header-version {
      font-size: 11px;
      font-weight: 400;
      color: #999;
    }

    .header-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .list {
      padding: 4px 0 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
    }

    .item-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #444;
    }

    .item-text {
      flex: 1;
    }

    .item-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .item-desc {
      font-size: 11.5px;
      color: #999;
      margin-top: 1px;
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 40px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: #e0e0e0;
      cursor: pointer;
      transition: background 200ms ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: transform 200ms ease;
    }

    .toggle input:checked + .toggle-track {
      background: #000;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid #000;
      outline-offset: 2px;
    }

    /* Color picker */
    .color-picker {
      position: relative;
      flex-shrink: 0;
    }

    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      padding: 0;
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/10px 10px;
    }

    .color-swatch.has-color {
      background: var(--swatch-color);
      border-color: var(--swatch-color);
    }

    .color-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 28px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      padding: 6px;
      gap: 4px;
      z-index: 10;
    }

    .color-dropdown.open {
      display: flex;
    }

    .color-option {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      padding: 0;
      position: relative;
    }

    .color-option.transparent {
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/10px 10px;
    }

    .color-option.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3px;
      border: 2px solid #000;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 16px 4px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-icons {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .site-icon {
      width: 16px;
      height: 16px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 150ms ease, opacity 150ms ease;
    }

    .site-icon svg {
      width: 100%;
      height: 100%;
    }

    .site-icon.off {
      filter: grayscale(1);
      opacity: 0.35;
    }

    .section + .section {
      border-top: 1px solid #f0f0f0;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 12px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 2px;
      outline: none;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      font-weight: 500;
      color: #666;
      min-width: 32px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Threads Auto Reveal <span class="header-version" id="version"></span></div>
    <div class="header-subtitle">Choose what to reveal automatically</div>
  </div>

  <div class="section">
    <div class="section-title">Spoiler Reveal</div>
    <div class="list">
      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Text</div>
        </div>
        <div class="color-picker">
          <button class="color-swatch" id="text-color-swatch" title="Highlight Color"></button>
          <div class="color-dropdown" id="text-color-dropdown">
            <button class="color-option transparent" data-color="" title="None"></button>
            <button class="color-option" data-color="rgba(96,165,250,0.35)" style="background:rgba(96,165,250,0.35)" title="Blue"></button>
            <button class="color-option" data-color="rgba(250,204,21,0.35)" style="background:rgba(250,204,21,0.35)" title="Yellow"></button>
            <button class="color-option" data-color="rgba(74,222,128,0.35)" style="background:rgba(74,222,128,0.35)" title="Green"></button>
            <button class="color-option" data-color="rgba(167,139,250,0.35)" style="background:rgba(167,139,250,0.35)" title="Purple"></button>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-text" checked>
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Media</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-media" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title section-title-row">
      <span>Video Controls</span>
      <div class="site-icons">
        <button class="site-icon" id="site-threads" title="Threads">

        </button>
        <button class="site-icon" id="site-instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="#FF0069" xmlns="http://www.w3.org/2000/svg"><path d="M7.0301.084c-1.2768.0602-2.1487.264-2.911.5634-.7888.3075-1.4575.72-2.1228 1.3877-.6652.6677-1.075 1.3368-1.3802 2.127-.2954.7638-.4956 1.6365-.552 2.914-.0564 1.2775-.0689 1.6882-.0626 4.947.0062 3.2586.0206 3.6671.0825 4.9473.061 1.2765.264 2.1482.5635 2.9107.308.7889.72 1.4573 1.388 2.1228.6679.6655 1.3365 1.0743 2.1285 1.38.7632.295 1.6361.4961 2.9134.552 1.2773.056 1.6884.069 4.9462.0627 3.2578-.0062 3.668-.0207 4.9478-.0814 1.28-.0607 2.147-.2652 2.9098-.5633.7889-.3086 1.4578-.72 2.1228-1.3881.665-.6682 1.0745-1.3378 1.3795-2.1284.2957-.7632.4966-1.636.552-2.9124.056-1.2809.0692-1.6898.063-4.948-.0063-3.2583-.021-3.6668-.0817-4.9465-.0607-1.2797-.264-2.1487-.5633-2.9117-.3084-.7889-.72-1.4568-1.3876-2.1228C21.2982 1.33 20.628.9208 19.8378.6165 19.074.321 18.2017.1197 16.9244.0645 15.6471.0093 15.236-.005 11.977.0014 8.718.0076 8.31.0215 7.0301.0839m.1402 21.6932c-1.17-.0509-1.8053-.2453-2.2287-.408-.5606-.216-.96-.4771-1.3819-.895-.422-.4178-.6811-.8186-.9-1.378-.1644-.4234-.3624-1.058-.4171-2.228-.0595-1.2645-.072-1.6442-.079-4.848-.007-3.2037.0053-3.583.0607-4.848.05-1.169.2456-1.805.408-2.2282.216-.5613.4762-.96.895-1.3816.4188-.4217.8184-.6814 1.3783-.9003.423-.1651 1.0575-.3614 2.227-.4171 1.2655-.06 1.6447-.072 4.848-.079 3.2033-.007 3.5835.005 4.8495.0608 1.169.0508 1.8053.2445 2.228.408.5608.216.96.4754 1.3816.895.4217.4194.6816.8176.9005 1.3787.1653.4217.3617 1.056.4169 2.2263.0602 1.2655.0739 1.645.0796 4.848.0058 3.203-.0055 3.5834-.061 4.848-.051 1.17-.245 1.8055-.408 2.2294-.216.5604-.4763.96-.8954 1.3814-.419.4215-.8181.6811-1.3783.9-.4224.1649-1.0577.3617-2.2262.4174-1.2656.0595-1.6448.072-4.8493.079-3.2045.007-3.5825-.006-4.848-.0608M16.953 5.5864A1.44 1.44 0 1 0 18.39 4.144a1.44 1.44 0 0 0-1.437 1.4424M5.8385 12.012c.0067 3.4032 2.7706 6.1557 6.173 6.1493 3.4026-.0065 6.157-2.7701 6.1506-6.1733-.0065-3.4032-2.771-6.1565-6.174-6.1498-3.403.0067-6.156 2.771-6.1496 6.1738M8 12.0077a4 4 0 1 1 4.008 3.9921A3.9996 3.9996 0 0 1 8 12.0077"/></svg>
        </button>
        <button class="site-icon" id="site-facebook" title="Facebook">
          <svg viewBox="0 0 24 24" fill="#0866FF" xmlns="http://www.w3.org/2000/svg"><path d="M9.101 23.691v-7.98H6.627v-3.667h2.474v-1.58c0-4.085 1.848-5.978 5.858-5.978.401 0 .955.042 1.468.103a8.68 8.68 0 0 1 1.141.195v3.325a8.623 8.623 0 0 0-.653-.036 26.805 26.805 0 0 0-.733-.009c-.707 0-1.259.096-1.675.309a1.686 1.686 0 0 0-.679.622c-.258.42-.374.995-.374 1.752v1.297h3.919l-.386 2.103-.287 1.564h-3.246v8.245C19.396 23.238 24 18.179 24 12.044c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.628 3.874 10.35 9.101 11.647Z"/></svg>
        </button>
      </div>
    </div>
    <div class="list">
      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Default Volume</div>
        </div>
      </div>
      <div class="slider-row">
        <input type="range" id="slider-volume" min="0" max="100" value="0">
        <span class="slider-value" id="volume-value">0%</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
