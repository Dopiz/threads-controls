<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Auto Reveal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #0f0f0f;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .header-version {
      font-size: 11px;
      font-weight: 400;
      color: #999;
    }

    .header-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .list {
      padding: 4px 0 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
    }

    .item-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #444;
    }

    .item-text {
      flex: 1;
    }

    .item-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .item-desc {
      font-size: 11.5px;
      color: #999;
      margin-top: 1px;
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 40px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: #e0e0e0;
      cursor: pointer;
      transition: background 200ms ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: transform 200ms ease;
    }

    .toggle input:checked + .toggle-track {
      background: #000;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid #000;
      outline-offset: 2px;
    }

    /* Color picker */
    .color-picker {
      position: relative;
      flex-shrink: 0;
    }

    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      padding: 0;
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/10px 10px;
    }

    .color-swatch.has-color {
      background: var(--swatch-color);
      border-color: var(--swatch-color);
    }

    .color-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 28px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      padding: 6px;
      gap: 4px;
      z-index: 10;
    }

    .color-dropdown.open {
      display: flex;
    }

    .color-option {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      padding: 0;
      position: relative;
    }

    .color-option.transparent {
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/10px 10px;
    }

    .color-option.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3px;
      border: 2px solid #000;
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 16px 4px;
    }

    .section + .section {
      border-top: 1px solid #f0f0f0;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 12px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 2px;
      outline: none;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      font-weight: 500;
      color: #666;
      min-width: 32px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Threads Auto Reveal <span class="header-version" id="version"></span></div>
    <div class="header-subtitle">Choose what to reveal automatically</div>
  </div>

  <div class="section">
    <div class="section-title">Spoiler Reveal</div>
    <div class="list">
      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Text</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-text" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="item-text">
        <div class="item-label">Text</div>
      </div>
      <div class="color-picker">
        <button class="color-swatch" id="text-color-swatch" title="Highlight color"></button>
        <div class="color-dropdown" id="text-color-dropdown">
          <button class="color-option transparent" data-color="" title="None"></button>
          <button class="color-option" data-color="rgba(250,204,21,0.35)" style="background:rgba(250,204,21,0.35)" title="Yellow"></button>
          <button class="color-option" data-color="rgba(96,165,250,0.35)" style="background:rgba(96,165,250,0.35)" title="Blue"></button>
          <button class="color-option" data-color="rgba(251,146,60,0.35)" style="background:rgba(251,146,60,0.35)" title="Orange"></button>
          <button class="color-option" data-color="rgba(244,114,182,0.35)" style="background:rgba(244,114,182,0.35)" title="Pink"></button>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-text" checked>
        <span class="toggle-track"></span>
      </label>
    </div>

      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Media</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-media" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Video</div>
    <div class="list">
      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Show Controls</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-video" checked>
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="item">
        <div class="item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </div>
        <div class="item-text">
          <div class="item-label">Default Volume</div>
        </div>
      </div>
      <div class="slider-row">
        <input type="range" id="slider-volume" min="0" max="100" value="0">
        <span class="slider-value" id="volume-value">0%</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
